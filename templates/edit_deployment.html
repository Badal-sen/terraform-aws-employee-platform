<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Deployment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    color:white;
}

.container-box{
    max-width:1000px;
    margin:auto;
    margin-top:50px;
}
</style>

</head>

<body>

<div class="container-box">

    <h1 class="mb-4">✏️ Edit Deployment</h1>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Application Name</label>
            <input
                type="text"
                class="form-control"
                name="application"
                value="{{ deployment.application }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Version</label>
            <input
                type="text"
                class="form-control"
                name="version"
                value="{{ deployment.version }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Environment</label>

            <select class="form-select" name="environment">

                <option value="Development"
                    {% if deployment.environment == "Development" %}selected{% endif %}>
                    Development
                </option>

                <option value="Staging"
                    {% if deployment.environment == "Staging" %}selected{% endif %}>
                    Staging
                </option>

                <option value="Production"
                    {% if deployment.environment == "Production" %}selected{% endif %}>
                    Production
                </option>

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>

            <select class="form-select" name="status">

                <option value="Success"
                    {% if deployment.status == "Success" %}selected{% endif %}>
                    Success
                </option>

                <option value="Failed"
                    {% if deployment.status == "Failed" %}selected{% endif %}>
                    Failed
                </option>

                <option value="Rollback"
                    {% if deployment.status == "Rollback" %}selected{% endif %}>
                    Rollback
                </option>

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Deployed By</label>
            <input
                type="text"
                class="form-control"
                name="deployed_by"
                value="{{ deployment.deployed_by }}"
                required>
        </div>

        <button type="submit" class="btn btn-warning">
            Update Deployment
        </button>

        <a href="/" class="btn btn-secondary">
            Back to Dashboard
        </a>

    </form>

</div>

</body>
</html>
