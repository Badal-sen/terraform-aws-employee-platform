<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Deployment</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body class="bg-dark text-white">

<div class="container mt-5">


<h1 class="mb-4">🚀 Create New Deployment</h1>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Application Name</label>
        <input type="text" class="form-control" name="application" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Version</label>
        <input type="text" class="form-control" name="version" placeholder="v1.0.0" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Environment</label>
        <select class="form-select" name="environment">
            <option>Development</option>
            <option>Staging</option>
            <option>Production</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Status</label>
        <select class="form-select" name="status">
            <option>Success</option>
            <option>Failed</option>
            <option>Rollback</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Deployed By</label>
        <input type="text" class="form-control" name="deployed_by" required>
    </div>

    <button type="submit" class="btn btn-primary">
        Create Deployment
    </button>

    <a href="/" class="btn btn-secondary">
        Back to Dashboard
    </a>

</form>


</div>

</body>
</html>
